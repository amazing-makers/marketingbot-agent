name: Release

# Trigger: push tag like v1.0.0 → build + auto-publish GitHub Release with .exe
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    name: Build and Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: npm 제거 — repo .gitignore 가 package-lock.json 을 무시해서
          # actions/setup-node@v4 가 cache key 생성 시 lock 파일을 못 찾고 fail.
          # cache 미사용 시 install 이 수십 초 더 걸리지만 빌드는 정상 진행.

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Playwright Browsers (Chromium)
        run: npx playwright install chromium

      - name: Build & Publish to GitHub Releases
        # electron-vite 정식판 (v2.3.0~) — main/preload/renderer 3-entry 자동 처리.
        # tsc 별도 불필요 (electron-vite 가 esbuild 로 transpile).
        shell: bash
        run: |
          npx electron-vite build
          npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: marketingbot-agent-windows-${{ github.ref_name }}
          path: release/
          retention-days: 14
